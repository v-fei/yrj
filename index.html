<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>飞飞&君君</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>

<body>
  <canvas id="fx-canvas" aria-hidden="true"></canvas>

  <section id="loading" class="loading-screen">
    <p class="loading-title">正在装载我们的回忆宇宙...</p>
    <div class="heart-shell" aria-hidden="true">
      <div id="heart-fill" class="heart-fill"></div>
      <div class="heart-outline"></div>
    </div>
    <p id="load-text" role="status" aria-live="polite">爱心充能中 0%</p>
    <button id="enter-app" disabled>加载中...</button>
  </section>

  <main id="app" hidden>
    <header class="topbar">
      <div id="chapter-progress" class="chapter-progress" aria-label="章节进度">
        <span data-scene-dot="opening"></span>
        <span data-scene-dot="album"></span>
        <span data-scene-dot="fireworks"></span>
        <span data-scene-dot="proposal"></span>
      </div>
      <div class="topbar-actions">
        <button id="enable-audio" class="icon-btn" type="button" aria-label="音乐">♪</button>
        <button id="mode-switch" class="icon-btn" type="button" aria-label="模式">自</button>
      </div>
    </header>

    <button id="nav-up" class="nav-btn nav-up" type="button" aria-label="上一个场景">˄</button>
    <button id="nav-down" class="nav-btn nav-down" type="button" aria-label="下一个场景">˅</button>

    <section id="opening" class="scene opening-scene" hidden>
      <p id="opening-line" class="opening-line"></p>
      <p id="opening-subline" class="opening-subline"></p>
    </section>

    <section id="album" class="scene" hidden>
      <p id="album-progress" class="album-progress"></p>
      <p class="album-hint">左右拖拽浏览照片墙，点击查看细节</p>
      <div id="album-wall-shell" class="album-wall-shell">
        <div id="album-wall" class="album-wall"></div>
      </div>
      <article id="album-focus" class="album-focus" hidden>
        <button id="album-focus-close" class="album-focus-close-btn" type="button" aria-label="关闭">×</button>
        <div class="album-focus-body">
          <img id="album-focus-image" alt="照片详情" />
          <p id="album-focus-time" class="album-focus-time"></p>
          <h4 id="album-focus-title"></h4>
          <p id="album-focus-caption"></p>
        </div>
      </article>
    </section>

    <section id="fireworks" class="scene fireworks-scene" hidden>
      <div class="fireworks-readable-layer" aria-live="polite" aria-atomic="true">
        <p id="fireworks-primary-text" class="fireworks-primary-text"></p>
        <p id="fireworks-secondary-text" class="fireworks-secondary-text"></p>
      </div>
      <div id="fireworks-countdown" class="fireworks-countdown"></div>
      <div id="fireworks-lines" class="copy-stack"></div>
      <p id="fireworks-fallback" class="fireworks-fallback" aria-live="polite" aria-atomic="true"></p>
    </section>

    <section id="proposal" class="scene proposal-scene" hidden>
      <div class="proposal-corridor" aria-hidden="true">
        <div class="corridor-lines"></div>
        <div class="corridor-glow"></div>
        <div class="volumetric-light light-a"></div>
        <div class="volumetric-light light-b"></div>
        <div class="volumetric-light light-c"></div>
        <div id="proposal-memory-traces" class="memory-traces"></div>
      </div>

      <div class="proposal-core">
        <p id="proposal-stage-status" class="sr-only" aria-live="polite" aria-atomic="true"></p>
        <p id="proposal-vow-line" class="proposal-vow-line"></p>
        <p id="proposal-vow-subline" class="proposal-vow-subline"></p>

        <button id="proposal-cta" class="ring-cta" type="button" hidden></button>

        <article id="vow-certificate" class="vow-certificate" hidden aria-live="polite" aria-atomic="true">
          <h3 id="certificate-title"></h3>
          <div class="certificate-body">
            <p id="certificate-line1"></p>
            <p id="certificate-line2"></p>
            <p id="certificate-line3"></p>
          </div>
          <div class="certificate-signature-row">
            <p id="certificate-signer-a" class="certificate-signature"></p>
            <p id="certificate-signer-b" class="certificate-signature"></p>
          </div>
          <p id="certificate-date" class="certificate-date"></p>
          <p id="certificate-epilogue" class="certificate-epilogue"></p>
        </article>
      </div>
    </section>
  </main>
  <div id="sr-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <script src="src/config/app-config.js"></script>
  <script src="src/js/app.js"></script>
</body>

</html>
